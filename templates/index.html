<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinBot - RAG Financial Analyst</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-profile">
                <div class="bot-avatar">$</div>
                <div>
                    <h1>FinBot Analyst</h1>
                    <span class="status">RAG Engine Active</span>
                </div>
            </div>
            <div class="disclaimer-badge">Not Financial Advice</div>
        </header>

        <main class="chat-messages" id="chatMessages">
            
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! I am your financial RAG assistant. I have access to the real-world stock market and the latest financial news. What would you like to investigate today?</p>
                </div>
            </div>

        </main>

        <footer class="chat-footer">
            <!--
            <div class="suggested-chips">
                <button class="chip" onclick="sendPreset('Analyze Q3 Revenue Growth')">Analyze Q3 Revenue</button>
                <button class="chip" onclick="sendPreset('Compare Profit Margins')">Compare Margins</button>
                <button class="chip" onclick="sendPreset('Check Debt-to-Equity Ratio')">Check Debt Metrics</button>
            </div> -->

            <form class="input-form" id="chatForm">
                <input type="text" id="userInput" placeholder="Ask about financial data, metrics, or compliance reports..." required autocomplete="off">
                <button type="submit" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="../static/script.js"></script>
</body>
</html>
